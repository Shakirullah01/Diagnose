{% extends "base.html" %}

{% block title %}Восстановление пароля{% endblock %}

{% block content %}
  <div class="container">
    <div class="row justify-content-center py-4">
      <div class="col-12 col-md-8 col-lg-5">
        <div class="card rounded-4 border-0 shadow-sm">
          <div class="card-body p-4 p-lg-5">
            <h1 class="h4 fw-semibold mb-1">Забыли пароль?</h1>
            <p class="text-muted mb-4">Введите email, и мы отправим ссылку для восстановления доступа.</p>

            <form method="post" class="vstack gap-3">
              {% csrf_token %}
              <div>
                <label class="form-label" for="{{ form.email.id_for_label }}">Email</label>
                <input
                  type="email"
                  name="{{ form.email.html_name }}"
                  id="{{ form.email.id_for_label }}"
                  class="form-control form-control-lg rounded-4"
                  placeholder="name@example.com"
                  value="{{ form.email.value|default_if_none:'' }}"
                  required
                >
                {% if form.email.errors %}
                  <div class="text-danger small mt-1">{{ form.email.errors }}</div>
                {% endif %}
              </div>
              <button type="submit" class="btn btn-primary btn-lg rounded-4 w-100">Отправить ссылку</button>
              <div class="text-center small">
                <a class="link-secondary" href="{% url 'login' %}">Вернуться ко входу</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
